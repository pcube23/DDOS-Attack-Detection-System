<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}DDoS Detector{% endblock %}</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">DDoS<span>Guard</span></div>
            <nav>
                <a href="/">Home</a>
                <a href="/upload">Upload</a>
                <a href="/dashboard">Dashboard</a>
                <a href="/reports">Reports</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
                <button id="themeToggle" class="btn ghost" type="button" title="Toggle theme">🌓</button>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="container">&copy; <span id="year"></span> DDoSGuard</div>
    </footer>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
