{% extends 'base.html' %}
{% block title %}Contact - DDoS Detector{% endblock %}
{% block content %}
<h2>Contact</h2>
<div class="card">
  <form class="contact-form" onsubmit="event.preventDefault(); alert('Thanks for your feedback!');">
    <label>Name <input type="text" required /></label>
    <label>Email <input type="email" required /></label>
    <label>Message <textarea required></textarea></label>
    <button class="btn primary" type="submit">Send</button>
  </form>
  <p>GitHub: <a href="#" target="_blank" rel="noreferrer">Project Link</a></p>
  <p>Report a Bug / Request Feature via the form above.</p>
</div>
{% endblock %}
